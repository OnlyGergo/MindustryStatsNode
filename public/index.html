<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mindustry Server Monitor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    /* Performance optimizations */
    .server-group.collapsed .server-content {
      display: none;
    }
    .chart-container {
      height: 120px; /* Smaller, more compact charts */
    }
    .blink {
      animation: blink 1s linear infinite;
    }
    @keyframes blink {
      50% { opacity: 0.5; }
    }
    /* Smoother transitions */
    .transition-height {
      transition: max-height 0.2s ease-out;
      overflow: hidden;
    }
    /* Prevent layout shifts */
    .stats-card {
      min-height: 70px;
    }
    /* Optimize for mobile */
    @media (max-width: 640px) {
      .chart-container {
        height: 100px;
      }
    }
  </style>
</head>
<body class="bg-gray-100 min-h-screen text-gray-800">
  <div class="container mx-auto p-4">
    <header class="bg-indigo-600 text-white p-4 rounded-lg shadow mb-4">
      <div class="flex justify-between items-center">
        <div>
          <h1 class="text-2xl font-bold">Mindustry Server Monitor</h1>
          <p class="mt-1 text-sm opacity-90">Real-time player counts and status</p>
        </div>
        <div class="flex items-center">
          <span id="connection-status" class="px-2 py-1 rounded text-xs bg-green-500 flex items-center">
            <span class="inline-block w-2 h-2 rounded-full bg-white mr-1"></span>
            Connected
          </span>
        </div>
      </div>
    </header>
    
    <div class="mb-4 flex flex-wrap items-center justify-between">
      <div class="mb-2 sm:mb-0">
        <h2 class="text-lg font-semibold">Server Status</h2>
        <p class="text-xs text-gray-600">Last updated: <span id="last-updated">Loading...</span></p>
      </div>
      <div class="flex space-x-2">
        <button id="expand-all" class="bg-indigo-500 hover:bg-indigo-600 text-white px-3 py-1 rounded text-sm transition-colors">Expand All</button>
        <button id="collapse-all" class="bg-gray-500 hover:bg-gray-600 text-white px-3 py-1 rounded text-sm transition-colors">Collapse All</button>
      </div>
    </div>
    
    <div class="mb-4">
      <div class="grid grid-cols-2 sm:grid-cols-4 gap-2 text-center text-sm">
        <div class="bg-white p-2 rounded shadow stats-card">
          <div class="text-gray-600">Total Servers</div>
          <div id="total-servers" class="text-xl font-bold">0</div>
        </div>
        <div class="bg-white p-2 rounded shadow stats-card">
          <div class="text-gray-600">Online Servers</div>
          <div id="online-servers" class="text-xl font-bold text-green-600">0</div>
        </div>
        <div class="bg-white p-2 rounded shadow stats-card">
          <div class="text-gray-600">Total Players</div>
          <div id="total-players" class="text-xl font-bold text-indigo-600">0</div>
        </div>
        <div class="bg-white p-2 rounded shadow stats-card">
          <div class="text-gray-600">Server Groups</div>
          <div id="server-groups" class="text-xl font-bold">0</div>
        </div>
      </div>
    </div>
    
    <div id="loading" class="text-center p-8 bg-white rounded-lg shadow mb-4">
      <div class="inline-block animate-spin rounded-full h-6 w-6 border-4 border-indigo-500 border-t-transparent"></div>
      <p class="mt-2">Loading server data...</p>
    </div>
    
    <div id="error" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative mb-4">
      <span class="block sm:inline">Failed to load server data. Please try again later.</span>
    </div>
    
    <div id="servers-container" class="space-y-3"></div>
    
    <footer class="mt-6 text-center text-xs text-gray-500 py-4">
      <p>Mindustry Server Monitor | Last updated: <span id="footer-timestamp">-</span></p>
    </footer>
  </div>
  <script src="/js/colors.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
